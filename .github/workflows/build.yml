# CI pipeline: formatting, compilation safety, image packaging
# and a headless QEMU boot of the synthesized system image.
name: "[Nix] Build & Test"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'cleave'

      # zig2nix uses bwrap which requires unprivileged user namespaces.
      # Ubuntu's default apparmor_restrict_unprivileged_userns=1 blocks this.
      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: "[treefmt] Check formatting"
        run: nix build .#checks.x86_64-linux.treefmt --print-build-logs

      - name: "[QEMU] Boot smoke test"
        run: nix build .#checks.x86_64-linux.boot-smoke -L

      - name: "[QEMU] Socket smoke test"
        run: nix build .#checks.x86_64-linux.socket-smoke -L

      - name: "[QEMU] Shell smoke test"
        run: nix build .#checks.x86_64-linux.shell-smoke -L

      - name: "[QEMU] TCP smoke test"
        run: nix build .#checks.x86_64-linux.tcp-smoke -L

      - name: "[Nix] Build the ERTS-linked image"
        run: nix build .#test-image                          

